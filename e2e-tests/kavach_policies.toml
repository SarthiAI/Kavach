# Kavach policies for the support-agent refund scenario.
#
# These are the rules the support agent's gate enforces on every tool call.
# The invariant hard-cap (₹50k) lives in code, not here — policies can be
# hot-reloaded without rebuilding, invariants cannot.

[[policy]]
name = "small_refunds"
description = "Agents can issue refunds up to ₹5,000, max 50 per 24h. Time-window is exercised separately by scenario 7 via hot reload."
effect = "permit"
priority = 10
conditions = [
    { identity_kind = "agent" },
    { action = "issue_refund" },
    { param_max = { field = "amount", max = 5000.0 } },
    { rate_limit = { max = 50, window = "24h" } },
]

[[policy]]
name = "read_order_always_ok"
description = "Agents can always read order data — no rate limit, no time restriction"
effect = "permit"
priority = 10
conditions = [
    { identity_kind = "agent" },
    { action = "read_order" },
]
