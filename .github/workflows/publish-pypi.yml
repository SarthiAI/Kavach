name: Publish Python SDK to PyPI

on:
  push:
    tags:
      - 'py-v*'
  workflow_dispatch:
    inputs:
      target:
        description: 'Where to publish'
        type: choice
        options:
          - test-pypi
          - pypi
        default: test-pypi

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-wheels:
    name: wheel (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: auto
          - name: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: auto
          - name: macos-x64
            os: macos-13
            target: x86_64-apple-darwin
            manylinux: "off"
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            manylinux: "off"
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: "off"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build abi3 wheel via maturin
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist --manifest-path kavach-py/Cargo.toml
          sccache: "true"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.name }}
          path: dist/*.whl
          if-no-files-found: error

  publish:
    name: publish (${{ (github.event_name == 'workflow_dispatch' && inputs.target) || 'pypi' }})
    runs-on: ubuntu-latest
    needs: [build-wheels]
    environment:
      name: release
      url: ${{ (github.event_name == 'workflow_dispatch' && inputs.target == 'test-pypi') && 'https://test.pypi.org/project/kavach/' || 'https://pypi.org/project/kavach/' }}
    permissions:
      id-token: write
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheel-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to Test PyPI
        if: github.event_name == 'workflow_dispatch' && inputs.target == 'test-pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

      - name: Publish to PyPI
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
